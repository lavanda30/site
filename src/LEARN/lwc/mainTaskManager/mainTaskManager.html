
<!-- Main Task Manager -->
<template>
    <c-task-list tasks={tasks} onedit={handleEdit} onreload={handleReloadAction}></c-task-list>
    <template if:true={editingTask}>
        <div class="slds-backdrop slds-backdrop_open"></div>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Edit Task</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input label="Task Name" name="subject" value={editingTask.subject} onchange={handleFieldChange}></lightning-input>
                </div>
                <footer class=slds-card__footer>
                    <lightning-button class="slds-m-right_small" label="Save" variant="brand" onclick={handleSave}></lightning-button>
                    <lightning-button label="Cancel" variant="success" onclick={handleCancel}></lightning-button>
                </footer>
            </div>
        </section>
    </template>
</template>
