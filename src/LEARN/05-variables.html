<!DOCTYPE html>
<html lang="en">
<head>
    <title>Game</title>
    <h2>Rock Paper Scissors Game</h2>
</head>
    <body>
        <button onclick="playGame('rock')">Rock</button>
        <button onclick="playGame('paper')">Paper</button>
        <button onclick="playGame('scissors')">Scissors</button>
        <button onclick="result.win = 0; result.lose = 0; result.tie = 0">RESET Result</button>
        <table aria-label="Result">{result}</table>
        <script>
            const result = {
                win: 0,
                lose: 0,
                tie: 0
            }
            function playGame(value) {
                const computerChoice = computerPlay();

                if(value === 'rock') {
                    if (computerChoice === 'rock') {
                        result.tie += 1;
                        alert(`Tie.
 Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    } else if (computerChoice === 'paper') {
                        result.lose += 1;
                        alert(`Computer selected paper. You loose.
 Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    } else if (computerChoice === 'scissors') {
                        result.win += 1;
                        alert(`Computer selected scissors. You win.
Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    }
                 }

                if(value === 'paper') {
                    if (computerChoice === 'paper') {
                        result.tie += 1;
                        alert(`Tie.
 Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    } else if (computerChoice === 'scissors') {
                        result.lose += 1;
                        alert(`Computer selected paper. You loose.
 Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    } else if (computerChoice === 'rock') {
                        result.win += 1;
                        alert(`Computer selected scissors. You win.
Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    }
                }

                if(value === 'scissors') {
                    if (computerChoice === 'scissors') {
                        result.tie += 1;
                        alert(`Tie.
 Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    } else if (computerChoice === 'rock') {
                        result.lose += 1;
                        alert(`Computer selected paper. You loose.
 Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    } else if (computerChoice === 'paper') {
                        result.win += 1;
                        alert(`Computer selected scissors. You win.
Wins: ${result.win}, Lose: ${result.lose}, Tie: ${result.tie}`);
                    }
                }
            }

            function computerPlay() {
                const randomNumber = Math.random();
                if (randomNumber < 0.34) {
                    return 'rock';
                } else if (randomNumber < 0.67) {
                    return 'paper';
                } else {
                    return 'scissors';
                }
            }
        </script>
    </body>
</html>
