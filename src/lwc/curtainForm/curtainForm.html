<!-- Curtain Form -->
<template>
    <lightning-card>
        <!--        <c-client-check class=checking></c-client-check>-->
        <div class=main-container>
            <div class=first-container>
                <h2>Інформація про кліента</h2>
                <div class="column_2">
                    <lightning-input
                            type="text"
                            label="Ім'я клиента"
                            onchange={handleInputChange}
                            data-field="name"
                            value={name}
                            class="input-with-clear"
                    ></lightning-input>
<!--                    <button-->
<!--                            class="clear-button"-->
<!--                            onclick={clearField}-->
<!--                            data-field="name"-->
<!--                            title="Очистити поле">-->
<!--                    </button>-->

                    <lightning-input type="text"
                                     label='Мобільнй'
                                     onchange={handleInputChange}
                                     data-field="phone"
                    ></lightning-input>
                </div>
                <div class="column_2">
                    <lightning-combobox name="discount"
                                        label="Програма лояльності"
                                        placeholder="Виберіть значення"
                                        options={discount}
                                        onchange={handleInputChange}
                                        data-field="discount">
                    </lightning-combobox>

                    <lightning-input type="text"
                                     label="Адреса"
                                     onchange={handleInputChange}
                                     data-field="address">
                    </lightning-input>

                </div>
                <lightning-input type="text"
                                 label='Коментар'
                                 onchange={handleInputChange}
                                 data-field="description">
                </lightning-input>

                <div class="line"></div>

                <h1>Заміри</h1>

                <template for:each={blocks} for:item="block">
                    <div key={block.id} class="block-container">
                        <lightning-button-icon icon-name="action:close"
                                               variant="bare"
                                               title="Видалити"
                                               data-id={block.id}
                                               class=close-button
                                               onclick={removeBlock}
                        ></lightning-button-icon>

                        <div class="column_3">
                            <lightning-input type="text"
                                             label='Кімната'
                                             onchange={handleInputChange}
                                             data-index={block.id}
                                             data-field="room">
                            </lightning-input>
                        </div>

                        <div class="column_3">

                            <lightning-combobox name="type"
                                                label="Тип"
                                                placeholder="Виберіть значення"
                                                options={type}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="type">
                            </lightning-combobox>

                            <lightning-combobox label="Кількість"
                                                name="quantity"
                                                options={quantity}
                                                value={block.quantity}
                                                placeholder="Виберіть значення"
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="quantity">
                            </lightning-combobox>

                            <lightning-input name="label"
                                             type="text"
                                             label="Назва"
                                             onchange={handleInputChange}
                                             data-index={block.id}
                                             data-field="label">
                            </lightning-input>

                        </div>

                        <div class="column_3">

                            <lightning-input name="price"
                                             type="text"
                                             label="Ціна"
                                             value={block.price}
                                             onchange={handleInputChange}
                                             data-index={block.id}
                                             data-field="price">
                            </lightning-input>

                            <lightning-combobox name="priceType"
                                                label="Валюта"
                                                value={block.priceType}
                                                placeholder="Виберіть значення"
                                                options={priceType}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="priceType">
                            </lightning-combobox>

                            <lightning-combobox name="nisha"
                                                label="Ніша"
                                                placeholder="Виберіть значення"
                                                options={nisha}
                                                value={block.nisha}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="nisha">
                            </lightning-combobox>
                        </div>

                        <div class="column_3">

                            <lightning-combobox name="carniz"
                                                label="Карніз"
                                                placeholder="Виберіть значення"
                                                options={carniz}
                                                value={block.carniz}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="carniz">
                            </lightning-combobox>

                            <lightning-combobox disabled={block.circleCarniz}
                                                name="picklist"
                                                placeholder="Виберіть значення"
                                                label="Діаметр карнізу"
                                                value={block.diameter}
                                                options={diameter}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="diameter">
                            </lightning-combobox>

                            <lightning-input type="text"
                                             label="Ширина карнізу (см)"
                                             onchange={handleInputChange}
                                             value={block.carniz_wigth}
                                             data-index={block.id}
                                             data-field="carniz_wigth">
                            </lightning-input>

                        </div>

                        <div class=column_3>

                            <lightning-input type="text"
                                             label="Ширина тканини (см)"
                                             onchange={handleInputChange}
                                             value={block.custom_wigth}
                                             data-index={block.id}
                                             data-field="custom_wigth">
                            </lightning-input>

                            <lightning-combobox name="heightPoint"
                                                label="Точка висоти"
                                                placeholder="Виберіть значення"
                                                options={highPoint}
                                                value={block.heightPoint}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="heightPoint">
                            </lightning-combobox>

                            <lightning-input type="text"
                                             label="Висота (см)"
                                             value={block.height}
                                             onchange={handleInputChange}
                                             data-index={block.id}
                                             data-field="height">
                            </lightning-input>
                        </div>

                        <div class=column_3>
                            <lightning-combobox name='tasma'
                                                label="Тасьма"
                                                placeholder="Виберіть значення"
                                                options={tasma}
                                                value={block.tasma}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="tasma">
                            </lightning-combobox>

                            <lightning-combobox disabled={block.ficsovanaTasma}
                                                name='zbirka'
                                                label="Збірка"
                                                value={block.zbirka}
                                                placeholder="Виберіть значення"
                                                options={zbirka}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="zbirka">
                            </lightning-combobox>

                            <lightning-combobox name='tasmaPrice'
                                                label="Ціна тасьми"
                                                value={block.tasmaPrice}
                                                placeholder="Виберіть значення"
                                                options={tasmaPrice}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="tasmaPrice">
                            </lightning-combobox>
                        </div>

                        <div class=column_3>
                            <lightning-combobox name='poshiv'
                                                label="Пошив"
                                                placeholder="Виберіть значення"
                                                options={poshiv}
                                                value={block.poshiv}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="poshiv">
                            </lightning-combobox>

                            <lightning-combobox name='delivery'
                                                label="Доставка"
                                                placeholder="Виберіть значення"
                                                options={delivery}
                                                value={block.delivery}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="delivery">
                            </lightning-combobox>

                            <lightning-combobox name='deliveryNumber'
                                                label="Кількість доставок"
                                                placeholder="Виберіть значення"
                                                options={deliveryNumber}
                                                value={block.deliveryNumber}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="deliveryNumber">
                            </lightning-combobox>
                        </div>

                        <div class=column_3>
                            <div class=column_2>
                            <lightning-input type="checkbox"
                                             label="Навіс"
                                             name="navis"
                                             checked={block.navis}
                                             onchange={handleInputChange}
                                             data-index={block.id}
                                             class=checkbox
                                             data-field="navis">
                            </lightning-input>
                            <lightning-input type="checkbox"
                                             label="Виїзд"
                                             name="viizd"
                                             class=checkbox
                                             checked={block.viizd}
                                             onchange={handleInputChange}
                                             data-index={block.id}
                                             data-field="viizd">
                            </lightning-input>
                            </div>
                            <lightning-combobox name='navisPrice'
                                                label="Ціна навісу"
                                                placeholder="Виберіть значення"
                                                options={navisPrice}
                                                value={block.navisPrice}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="navisPrice">
                            </lightning-combobox>

                            <lightning-combobox name='curtainDiscount'
                                                label="Програма лояльності"
                                                placeholder="Виберіть значення"
                                                options={curtainDiscount}
                                                value={block.curtainDiscount}
                                                onchange={handleInputChange}
                                                data-index={block.id}
                                                data-field="curtainDiscount">
                            </lightning-combobox>

                        </div>

                        <div class="line"></div>
                    </div>
                </template>

                <lightning-button variant="neutral"
                                  icon-name="utility:add"
                                  icon-position="left"
                                  label="Додати штору"
                                  onclick={addBlock}
                ></lightning-button>

                <lightning-button class="saveButton" label={buttonLabel}
                                  onclick={handleSaveButton} variant="brand">
                </lightning-button>
            </div>
            <div class=second-container>
                <div class="pictureContainer">
                    <span class="dimension-high">320 cм</span>
                    <span class="dimension-wight">321 cм</span>
                    <img class="picture" src={curtainUrl} alt="Curtain"/>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
